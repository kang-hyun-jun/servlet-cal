<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My calculater</title>
    <link rel="icon" type="image/png" href="./img/calculator.png" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="app" class="min-h-screen">
    <!-- Navigation -->
    <nav class="bg-purple-700 text-white p-4">
    </nav>
    <!-- Login Form -->
    <div  class="container mx-auto p-8">
        <div class="max-w-md mx-auto bg-amber-50 p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold text-purple-700 mb-6">calculator</h2>
            <div class="space-y-4">
                <form action="http://localhost:8080/Calculator" method="post" class="space-y-4">
                    <div>
                        <input type="text"  name="value" placeholder="Enter First Num" class="w-full p-3 border rounded focus:outline-none focus:border-purple-500">
                    </div>
                    <div class="space-y-4">
                        <input type="submit" name ="cal" value="+" class="w-full bg-purple-700 text-white py-3 rounded hover:bg-purple-800 transition">
                        <input type="submit" name ="cal" value="*" class="w-full bg-purple-700 text-white py-3 rounded hover:bg-purple-800 transition">
                        <input type="submit" name ="cal" value="-" class="w-full bg-purple-700 text-white py-3 rounded hover:bg-purple-800 transition">
                        <input type="submit" name ="cal" value="/" class="w-full bg-purple-700 text-white py-3 rounded hover:bg-purple-800 transition">
                        <input type="submit" name ="cal" value="=" class="w-full bg-purple-700 text-white py-3 rounded hover:bg-purple-800 transition">
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
